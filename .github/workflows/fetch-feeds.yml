name: Fetch RSS Feeds
on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:       # lets you trigger manually too

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch Buzzsprout feed
        run: |
          curl -s "https://feeds.buzzsprout.com/2569924.rss" -o feed.xml
          python3 scripts/parse_feed.py

      - name: Commit JSON files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add episodes.json posts.json
          git diff --staged --quiet || git commit -m "Update feeds"
          git push
